services:
  napcat:
    image: ${NAPCAT_IMAGE:-mlikiowa/napcat-docker:latest}
    container_name: napcat
    environment:
      NAPCAT_UID: ${NAPCAT_UID:-0}
      NAPCAT_GID: ${NAPCAT_GID:-0}
      ACCOUNT: ${NAPCAT_ACCOUNT:-}
      WEBUI_TOKEN: ${NAPCAT_WEBUI_TOKEN:-napcat}
      WEBUI_PREFIX: ${NAPCAT_WEBUI_PREFIX:-}
      MODE: ${NAPCAT_MODE:-ws}
    volumes:
      - ${NAPCAT_DATA_DIR:-./data/napcat}/qq:/app/.config/QQ
      - ${NAPCAT_DATA_DIR:-./data/napcat}/config:/app/napcat/config
      - ${NAPCAT_DATA_DIR:-./data/napcat}/plugins:/app/napcat/plugins
    ports:
      - "${NAPCAT_HTTP_PORT:-3000}:3000"
      - "${NAPCAT_WS_PORT:-3001}:3001"
      - "${NAPCAT_WEBUI_PORT:-6099}:6099"
    shm_size: "1gb"
    init: true
    restart: unless-stopped

  clawdbot-gateway:
    image: ${CLAWDBOT_IMAGE:-ghcr.io/dogami567/clawdbot-exa:latest}
    container_name: clawdbot-gateway
    environment:
      HOME: /home/node
      TERM: xterm-256color
      CLAWDBOT_GATEWAY_TOKEN: ${CLAWDBOT_GATEWAY_TOKEN}

      # Model providers
      OPENAI_API_KEY: ${CLAWDBOT_OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${CLAWDBOT_OPENAI_BASE_URL:-}
      OPENROUTER_API_KEY: ${CLAWDBOT_OPENROUTER_API_KEY:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}

      # Exa provider (web_search)
      EXA_API_KEYS: ${EXA_API_KEYS:-}
      EXA_API_KEY: ${EXA_API_KEY:-}
    volumes:
      - ${CLAWDBOT_CONFIG_DIR:-./data/clawdbot/config}:/home/node/.clawdbot
      - ${CLAWDBOT_WORKSPACE_DIR:-./data/clawdbot/workspace}:/home/node/clawd
    ports:
      - "${CLAWDBOT_GATEWAY_PORT:-18789}:18789"
      - "${CLAWDBOT_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${CLAWDBOT_GATEWAY_BIND:-lan}",
        "--port",
        "${CLAWDBOT_GATEWAY_PORT:-18789}"
      ]

  clawdbot-cli:
    image: ${CLAWDBOT_IMAGE:-ghcr.io/dogami567/clawdbot-exa:latest}
    container_name: clawdbot-cli
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BROWSER: echo

      # Model providers
      OPENAI_API_KEY: ${CLAWDBOT_OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${CLAWDBOT_OPENAI_BASE_URL:-}
      OPENROUTER_API_KEY: ${CLAWDBOT_OPENROUTER_API_KEY:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}

      # Exa provider (web_search)
      EXA_API_KEYS: ${EXA_API_KEYS:-}
      EXA_API_KEY: ${EXA_API_KEY:-}
    volumes:
      - ${CLAWDBOT_CONFIG_DIR:-./data/clawdbot/config}:/home/node/.clawdbot
      - ${CLAWDBOT_WORKSPACE_DIR:-./data/clawdbot/workspace}:/home/node/clawd
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]

