name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  patch-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read pinned Clawdbot ref
        id: clawdbot_ref
        run: echo "ref=$(cat clawdbot.ref)" >> "$GITHUB_OUTPUT"

      - name: Checkout upstream Clawdbot
        uses: actions/checkout@v4
        with:
          repository: clawdbot/clawdbot
          ref: ${{ steps.clawdbot_ref.outputs.ref }}
          path: clawdbot

      - name: Apply Exa patch
        run: |
          cd clawdbot
          git apply --check ../patches/clawdbot/exa-web-search.patch
          git apply ../patches/clawdbot/exa-web-search.patch

      - name: Validate docker-compose templates
        run: |
          for d in stacks/*; do
            echo "Checking $d"
            (cd "$d" && docker compose config >/dev/null)
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: ./clawdbot
          file: ./clawdbot/Dockerfile
          platforms: linux/amd64
          push: false
          tags: clawdbot-exa:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
