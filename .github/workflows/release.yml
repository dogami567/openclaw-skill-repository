name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: clawdbot-exa

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read pinned Clawdbot ref
        id: clawdbot_ref
        run: echo "ref=$(cat clawdbot.ref)" >> "$GITHUB_OUTPUT"

      - name: Checkout upstream Clawdbot
        uses: actions/checkout@v4
        with:
          repository: clawdbot/clawdbot
          ref: ${{ steps.clawdbot_ref.outputs.ref }}
          path: clawdbot

      - name: Apply Exa patch
        run: |
          cd clawdbot
          git apply --check ../patches/clawdbot/exa-web-search.patch
          git apply ../patches/clawdbot/exa-web-search.patch

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./clawdbot
          file: ./clawdbot/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package stacks
        run: |
          mkdir -p dist
          cp clawdbot.ref dist/clawdbot.ref
          for d in stacks/*; do
            name="$(basename "$d")"
            (cd "$d" && zip -r "../../dist/${name}-${{ github.ref_name }}.zip" .)
          done
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
            dist/clawdbot.ref
